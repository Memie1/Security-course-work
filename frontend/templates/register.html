{% extends "base.html" %}
{% block title %}Register — Amazing Bargain Central{% endblock %}

{% block content %}
<!-- This form creates a new user account. -->
<section class="page-section narrow">
    <h1>Create account</h1>
    <form method="post" class="form-card">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

        <label for="username">Username</label>
        <input type="text" name="username" id="username" required
               placeholder="3-20 chars, letters/numbers/underscores" maxlength="20">

        <label for="email">Email</label>
        <input type="email" name="email" id="email" required placeholder="you@example.com">

        <label for="password">Password</label>
        <input type="password" name="password" id="password" required
               placeholder="At least 8 characters" minlength="8">

        <button type="submit" class="btn btn-primary">Register</button>
    </form>
    <p class="muted">Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
</section>
{% endblock %}
